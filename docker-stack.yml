version: '3.8'

services:
  client:
    # IMAGE_PREFIX is set by the CI workflow to ghcr.io/<github-owner>.
    # For manual deploys, export IMAGE_PREFIX before running docker stack deploy.
    image: ${IMAGE_PREFIX}/collab-editor-client:latest
    ports:
      - "80:80"
    networks:
      - collab-net
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s

  sync-server:
    image: ${IMAGE_PREFIX}/collab-editor-sync-server:latest
    networks:
      - collab-net
    deploy:
      replicas: 1

networks:
  collab-net:
    driver: overlay
