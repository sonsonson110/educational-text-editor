# Triggered on every push to main.
# Runs two sequential jobs:
#   1. build-and-push  — builds both Docker images and publishes them to GHCR.
#   2. deploy-to-vm    — SSHs into the VM via Cloudflare Tunnel and triggers a
#                        rolling update of the Docker Swarm stack.

name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build both Docker images and push them to GitHub Container Registry.
  # Uses the built-in GITHUB_TOKEN — no separate Docker Hub credentials needed.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    # Grant the job permission to write packages to GHCR.
    permissions:
      contents: read
      packages: write

    steps:
      # Check out the repository so the Dockerfiles and source code are available.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx to enable advanced build features (caching, multi-platform).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR using the automatic GITHUB_TOKEN.
      # Images will be published under: ghcr.io/<repository-owner>/...
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the collaboration server image and push it to GHCR.
      # No build-time secrets are required for the server.
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collab-editor-server:latest

      # Build the client image and push it to GHCR.
      # VITE_WS_URL is baked into the static bundle at build time — it must
      # point to the permanent WebSocket URL served by the Cloudflare Tunnel.
      # VITE_ROOM_NAME is hardcoded to "document-room".
      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/client/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collab-editor-client:latest
          build-args: |
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_ROOM_NAME=document-room

  # ---------------------------------------------------------------------------
  # Job 2: SSH into the VM and trigger a Docker Swarm rolling update.
  # The VM is not exposed to the public internet; SSH is routed through the
  # Cloudflare Tunnel using `cloudflared` as a ProxyCommand.
  # ---------------------------------------------------------------------------
  deploy-to-vm:
    name: Deploy to VM via SSH over Cloudflare Tunnel
    runs-on: ubuntu-latest
    needs: build-and-push  # Only runs after images are successfully pushed.

    steps:
      # Install the cloudflared binary so it can be used as an SSH proxy.
      # This is required because the VM's SSH port is not directly reachable —
      # all traffic must go through the Cloudflare Tunnel.
      - name: Install cloudflared
        run: |
          curl -fsSL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # Write the SSH private key and configure the SSH client to route
      # connections to VM_SSH_HOST through cloudflared.
      # StrictHostKeyChecking is disabled because the runner is ephemeral and
      # has no known_hosts file to verify against.
      - name: Configure SSH with Cloudflare Proxy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config << EOF
          Host ${{ secrets.VM_SSH_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            IdentityFile ~/.ssh/id_ed25519
          EOF

      # Connect to the VM and instruct Docker Swarm to perform a rolling update.
      # --with-registry-auth forwards the runner's GHCR credentials to the
      # Swarm manager so it can pull the newly pushed private images.
      # IMAGE_PREFIX is passed so docker-stack.yml resolves the correct GHCR path.
      - name: Deploy stack to Docker Swarm
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_SSH_HOST }} \
            "IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }} \
             docker stack deploy \
               --with-registry-auth \
               -c ~/docker-stack.yml \
               collab-editor"
