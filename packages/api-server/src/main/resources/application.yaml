spring:
  application:
    name: api-server

  docker:
    compose:
      skip:
        in-tests: false

  datasource:
    url: jdbc:postgresql://localhost:5432/collab-editor
    username: root
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway owns schema creation — never let Hibernate modify the schema
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

# JWT configuration
# Production: override `app.jwt.secret` via APP_JWT_SECRET environment variable.
# The secret must be identical in the Node sync-server (Iteration 5).
app:
  jwt:
    secret: XtVWcilMyRXDU/NTpTCsZp/V5yqM8Cv8BXNwnZ8fFyY=
    expiration-ms: 3600000         # 1 hour for authenticated users
    guest-expiration-ms: 86400000  # 24 hours for guest tokens
