spring:
  application:
    name: api-server

  docker:
    compose:
      skip:
        in-tests: false

  datasource:
    url: jdbc:postgresql://localhost:5432/collab-editor
    username: root
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway owns schema creation — never let Hibernate modify the schema
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
