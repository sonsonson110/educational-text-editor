version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      - PORT=1234
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      args:
        - VITE_WS_URL=ws://localhost:8080/ws
        - VITE_ROOM_NAME=document-room
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped
